<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MY STYLE BOOK</title>

<link rel="stylesheet" href="style.css">

<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.css"
/>

</head>

<body>

<!-- Loading -->

<div id="loading">

    <h1>MY STYLE BOOK</h1>

    <p>Loading...</p>

</div>

<!-- Book -->

<div id="book-wrapper" class="hidden">

    <div id="book">

        <!-- Cover -->

        <div class="page cover">

            <div class="cover-content">

                <h1>MY STYLE BOOK</h1>

                <p>Everyday Uniform</p>

                <span>Tap to Open</span>

            </div>

        </div>

        <!-- Pages are generated by JavaScript -->

    </div>

</div>

<!-- Page Number -->

<div id="page-indicator">

    <span id="current-page">Cover</span>

</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script src="script.js"></script>

</body>

</html>
