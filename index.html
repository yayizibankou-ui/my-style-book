<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MY STYLE BOOK</title>

    <meta name="description"
        content="MY STYLE BOOK - Timeless Elegance">

    <meta name="theme-color"
        content="#3d3028">

    <meta name="color-scheme"
        content="light">

    <meta name="author"
        content="MY STYLE BOOK">

    <!-- Google Fonts -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Loading -->
    <div id="loading"
        aria-live="polite">

        <div class="loader">

            <h1 class="loader-title">
                MY STYLE BOOK
            </h1>

            <p class="loader-subtitle">
                Timeless Elegance
            </p>

        </div>

    </div>

    <main class="book-wrapper">

        <section
            id="book"
            aria-label="MY STYLE BOOK">
        </section>

    </main>
<nav class="book-nav" aria-label="ブックナビゲーション">

    <button id="prevPage" class="nav-button" type="button">
        ← 前へ
    </button>
    
    <button id="tocButton" class="nav-button" type="button">
        ☰ 目次
    </button>
    
    <div id="pageIndicator" class="page-indicator">
        1 / 36
    </div>

    <button id="nextPage" class="nav-button" type="button">
        次へ →
    </button>

</nav>
    <aside id="tocPanel" class="toc-panel" aria-label="目次">

    <div class="toc-header">
        <h2>CONTENTS</h2>

        <button id="closeToc" class="nav-button" type="button">
            ✕
        </button>
    </div>

    <div id="tocList" class="toc-list"></div>

</aside>
    <noscript>

        <div class="no-script">

            このブックを閲覧するにはJavaScriptを有効にしてください。

        </div>

    </noscript>

    <!-- PageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
